services:
  db:
    image: postgres:17-alpine
    container_name: helioscada-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helioscada
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: helioscada-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "timeout", "2", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: hiseulgi/helioscada-backend:latest
    container_name: helioscada-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: helioscada
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: 1883
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  bridge:
    build: .
    image: hiseulgi/helioscada-backend:latest
    container_name: helioscada-bridge
    restart: always
    command: python -u src/backend/bridge/main.py
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: helioscada
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: 1883
      API_URL: "http://api:8000/api/v1"
    depends_on:
      api:
        condition: service_started
      mosquitto:
        condition: service_healthy

volumes:
  mosquitto_data:
  mosquitto_log:
